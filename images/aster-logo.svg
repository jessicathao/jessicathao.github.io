<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Aster amellus flower logo">
  <defs>

    <!-- Purple/pink gradient for petals — authentic Aster amellus colour -->
    <radialGradient id="pg" cx="40" cy="40" r="34" gradientUnits="userSpaceOnUse">
      <stop offset="10%"  stop-color="#D09AE0"/>
      <stop offset="55%"  stop-color="#9040B8"/>
      <stop offset="100%" stop-color="#6B2A95"/>
    </radialGradient>

    <!-- Petal midrib highlight: subtle white shimmer line on each petal -->
    <linearGradient id="mh" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.30"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold gradient for the disc center -->
    <radialGradient id="dg" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FDF0A0"/>
      <stop offset="45%"  stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#7A5008"/>
    </radialGradient>

    <!-- Warm drop shadow for the whole flower -->
    <filter id="fs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3d1260" flood-opacity="0.28"/>
    </filter>

    <!-- Soft glow on disc -->
    <filter id="discglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══════════════════════════════════════
       FLOWER GROUP — drop shadow on everything
       ═══════════════════════════════════════ -->
  <g filter="url(#fs)">

    <!-- ─── 18 PETALS (noble blue, each 20° apart) ─── -->
    <!-- Petal path: base at r=11 → (40,29); tip at r=34 → (40,6) -->
    <!-- Bezier control points give a narrow, tapered aster shape  -->
    <g fill="url(#pg)">
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(0,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(20,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(40,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(60,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(80,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(100,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(120,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(140,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(160,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(180,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(200,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(220,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(240,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(260,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(280,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(300,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(320,40,40)"/>
      <path d="M40,29 C37,21 36.5,12 40,6 C43.5,12 43,21 40,29Z" transform="rotate(340,40,40)"/>
    </g>

    <!-- Midrib highlight line on each petal (thin white shimmer) -->
    <g stroke="url(#mh)" stroke-width="0.9" fill="none" stroke-linecap="round">
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(0,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(20,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(40,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(60,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(80,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(100,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(120,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(140,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(160,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(180,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(200,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(220,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(240,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(260,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(280,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(300,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(320,40,40)"/>
      <line x1="40" y1="28" x2="40" y2="8" transform="rotate(340,40,40)"/>
    </g>

    <!-- ─── GOLDEN DISC CENTER ─── -->
    <!-- Outer rim ring: slight dark gold border for separation -->
    <circle cx="40" cy="40" r="11.5" fill="#8A6010" opacity="0.6"/>
    <!-- Main disc -->
    <circle cx="40" cy="40" r="10.5" fill="url(#dg)" filter="url(#discglow)"/>

    <!-- Disc floret texture: small dark bumps arranged in a spiral -->
    <g fill="rgba(100,60,4,0.35)">
      <circle cx="37.8" cy="36.8" r="1.3"/>
      <circle cx="41.0" cy="36.0" r="1.3"/>
      <circle cx="43.5" cy="38.2" r="1.3"/>
      <circle cx="43.0" cy="41.5" r="1.3"/>
      <circle cx="40.0" cy="43.5" r="1.3"/>
      <circle cx="36.8" cy="42.5" r="1.3"/>
      <circle cx="36.0" cy="39.5" r="1.3"/>
    </g>
    <!-- Inner floret ring (lighter dots) -->
    <g fill="rgba(100,60,4,0.2)">
      <circle cx="39.5" cy="38.5" r="1.0"/>
      <circle cx="41.5" cy="39.2" r="1.0"/>
      <circle cx="41.0" cy="41.2" r="1.0"/>
      <circle cx="39.0" cy="41.8" r="1.0"/>
      <circle cx="37.8" cy="40.5" r="1.0"/>
    </g>

    <!-- Disc highlight: bright catch-light top-left -->
    <circle cx="37.2" cy="36.5" r="3.8" fill="rgba(255,255,255,0.30)"/>
    <!-- Tiny secondary sparkle -->
    <circle cx="42.5" cy="37.5" r="1.5" fill="rgba(255,255,255,0.18)"/>

  </g>
</svg>
